<!doctype html>
<meta charset="utf-8" />
<style>
  body { font-family: -apple-system, system-ui, sans-serif; width: 280px; margin: 0; padding: 14px; color: #1c1c1e; }
  h1 { font-size: 14px; margin: 0 0 10px; }
  label { font-size: 12px; color: #6b6b73; display: block; margin-bottom: 4px; }
  label .dim { color: #b0b0b8; font-weight: normal; }
  input, textarea { width: 100%; box-sizing: border-box; border: 1px solid #dcdce2; border-radius: 8px; padding: 7px 9px; font: inherit; font-size: 12px; margin-bottom: 10px; resize: vertical; }
  textarea { font-family: ui-monospace, Menlo, monospace; line-height: 1.45; }
  button { width: 100%; background: #1c1c1e; color: #fff; border: none; border-radius: 8px; padding: 9px; font: inherit; font-weight: 600; font-size: 13px; cursor: pointer; }
  button:hover { background: #000; }
  button.secundario { background: #fff; color: #1c1c1e; border: 1px solid #dcdce2; margin-bottom: 8px; }
  button.secundario:hover { background: #f6f6f7; }
  .ok { color: #1f9d55; font-size: 11px; margin: -6px 0 8px; min-height: 13px; }
  .hint { font-size: 11px; color: #9a9aa2; margin-top: 10px; line-height: 1.45; }
  code { background: #f0f0f3; padding: 1px 4px; border-radius: 4px; }
</style>
<h1>🛠 modo dev</h1>

<label>Porta do daemon</label>
<input id="porta" type="text" value="4747" />

<label>Aparece sozinho nestes sites <span class="dim">(um por linha, pattern de URL)</span></label>
<textarea id="sites" rows="5" placeholder="http://localhost/*&#10;http://127.0.0.1/*&#10;https://meusite.com/*"></textarea>
<div class="ok" id="status"></div>

<button id="painel" class="secundario">📺 Abrir painel (ver o CLI em tempo real)</button>
<button id="ativar">Ativar nesta aba (manual)</button>

<p class="hint">Os sites listados mantêm o overlay no reload. Pra rodar o daemon dentro do projeto:<br /><code>bun ~/Documents/Kinus/modo-dev/daemon.ts</code></p>
<script src="popup.js"></script>
