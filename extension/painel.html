<!doctype html>
<meta charset="utf-8" />
<title>modo dev — painel</title>
<style>
  :root {
    --bg: #0e0f12;
    --bg2: #16181d;
    --linha: #2a2d35;
    --texto: #e6e6ea;
    --dim: #8a8d97;
    --acento: #7f6cff;
    --ok: #58c79a;
    --erro: #ff7a7a;
    --tool: #f0c674;
    --ferr: #ffb86c;
    --mono: ui-monospace, "SF Mono", Menlo, monospace;
  }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--texto); font-family: -apple-system, system-ui, sans-serif; min-height: 100%; }
  body { padding-bottom: 110px; }
  header {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px; border-bottom: 1px solid var(--linha);
    background: var(--bg2); position: sticky; top: 0; z-index: 2;
  }
  h1 { font-size: 13px; margin: 0; font-weight: 700; }
  .estado { font-size: 11px; padding: 2px 7px; border-radius: 999px; background: #292c33; color: var(--dim); }
  .estado.on { background: rgba(88,199,154,0.15); color: var(--ok); }
  .estado.off { background: rgba(255,122,122,0.15); color: var(--erro); }
  .barra-acoes { margin-left: auto; display: flex; gap: 6px; }
  button { background: #232630; color: var(--texto); border: 1px solid var(--linha); border-radius: 7px; padding: 4px 9px; font: inherit; font-size: 11px; cursor: pointer; }
  button:hover { background: #2c303a; }
  #lista { padding: 8px 10px 24px; }
  .ev { padding: 7px 9px; margin-bottom: 6px; border-radius: 8px; background: var(--bg2); border: 1px solid var(--linha); font-size: 12px; line-height: 1.4; }
  .ev .cab { display: flex; gap: 8px; align-items: center; color: var(--dim); font-size: 10px; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
  .ev .cab .tag { padding: 1px 6px; border-radius: 4px; background: #2a2d35; color: var(--texto); }
  .ev.start .cab .tag { background: rgba(127,108,255,0.2); color: var(--acento); }
  .ev.end .cab .tag { background: rgba(88,199,154,0.2); color: var(--ok); }
  .ev.stderr .cab .tag { background: rgba(255,122,122,0.18); color: var(--erro); }
  .ev.tool .cab .tag { background: rgba(240,198,116,0.18); color: var(--tool); }
  .ev.assistant .cab .tag { background: rgba(127,108,255,0.18); color: var(--acento); }
  .ev.info .cab .tag { background: rgba(255,184,108,0.18); color: var(--ferr); }
  .ev pre { margin: 0; white-space: pre-wrap; word-break: break-word; font-family: var(--mono); font-size: 11.5px; color: var(--texto); }
  .ev .texto { white-space: pre-wrap; word-break: break-word; }
  .ev .arquivo { font-family: var(--mono); font-size: 11px; color: var(--ferr); }
  .ev .raw { color: var(--dim); font-size: 10.5px; max-height: 120px; overflow: auto; }
  .vazio { color: var(--dim); font-size: 12px; padding: 16px; text-align: center; }
  details { margin-top: 4px; }
  details summary { cursor: pointer; color: var(--dim); font-size: 10.5px; }
  .pulse { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--ok); margin-right: 4px; box-shadow: 0 0 0 0 rgba(88,199,154,0.7); animation: pulse 1.4s infinite; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(88,199,154,0.7);} 70% { box-shadow: 0 0 0 6px rgba(88,199,154,0);} 100% { box-shadow: 0 0 0 0 rgba(88,199,154,0);} }
  #composer {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: var(--bg2); border-top: 1px solid var(--linha);
    padding: 8px 10px; display: flex; gap: 6px; align-items: flex-end; z-index: 3;
  }
  #composer textarea {
    flex: 1; min-height: 36px; max-height: 160px; resize: none;
    background: #0e0f12; color: var(--texto); border: 1px solid var(--linha); border-radius: 8px;
    padding: 8px 10px; font: inherit; font-size: 12px; line-height: 1.4; font-family: var(--mono);
  }
  #composer textarea:focus { outline: none; border-color: var(--acento); }
  #composer button.primario {
    background: var(--acento); color: #fff; border: none; padding: 8px 12px; height: 36px;
    font-weight: 600; font-size: 12px; border-radius: 8px; cursor: pointer; white-space: nowrap;
  }
  #composer button.primario:disabled { opacity: 0.5; cursor: wait; }
  #composer .dica { font-size: 10px; color: var(--dim); padding: 0 4px 2px; }
</style>
<header>
  <h1>🛠 modo-dev</h1>
  <span id="estado" class="estado off">desconectado</span>
  <div class="barra-acoes">
    <button id="limpar">limpar</button>
    <button id="auto" title="rolar pro fim automaticamente">auto-rolar: on</button>
  </div>
</header>
<div id="lista"><div class="vazio">aguardando eventos do daemon…</div></div>
<div id="composer">
  <textarea id="entrada" placeholder="digita um pedido pro CLI (Cmd/Ctrl+Enter envia)" rows="2"></textarea>
  <button id="enviar" class="primario">Enviar</button>
</div>
<script src="painel.js"></script>
